name: CI

# Runs on every PR and on push to main. Catches the SDK-method-name and
# version-pin guesses captured in docs/SHAKEOUT.md without needing
# anyone to drive a local build.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: vet + fmt + staticcheck + test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Track go.mod's `go` directive — testcontainers-go's
          # transitive otel deps require Go 1.25+, and pinning here
          # would diverge silently from go.mod. setup-go reads the
          # directive and downloads a matching toolchain.
          go-version-file: go.mod
          cache: true

      - name: Resolve modules
        run: |
          go mod download
          go mod verify

      - name: go vet
        run: go vet ./...

      - name: gofmt
        # Fail if any file is not gofmt-clean. `tee` keeps the diff in the
        # log so reviewers can see exactly what's wrong.
        run: gofmt -d -l . | tee /tmp/gofmt.diff && test ! -s /tmp/gofmt.diff

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: 'latest'
          install-go: false

      - name: go test
        # -race catches data races; cheap to run on the small unit suite
        # we have today. Sprint 2 added `internal/k8s/*_test.go` —
        # they're picked up here automatically once the integrator drops
        # the `k8sinternal` build tag (carried temporarily during staff
        # +validator parallel work). See `internal/k8s/get_test.go`
        # header for the rationale and removal plan.
        run: go test -race ./...

      - name: go build
        # Build everything (cmd/ + internal/) to catch any unused-import
        # or undefined-symbol issues that vet/test missed.
        run: go build ./...

  integration:
    name: integration (testcontainers — sshd)
    needs: test
    # Linux only: testcontainers-go on macOS GitHub runners requires Docker
    # Desktop, which isn't installed on the hosted images. Windows runners
    # have similar Docker-availability gaps. Linux runners ship Docker by
    # default, so we get a free integration tier on every push to main and
    # on same-repo PRs.
    #
    # Skipped on PRs from forks: the `head.repo.full_name == repository`
    # check below excludes those. Forks would otherwise hit Docker rate
    # limits without the right secrets and produce noisy red-x checks for
    # contributions that don't even touch internal/remote.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Track go.mod's `go` directive rather than hard-coding here —
          # the testcontainers-go dependency chain (docker → otel) pulls
          # in a recent toolchain requirement; pinning a stale version
          # in this YAML would diverge silently.
          go-version-file: go.mod
          cache: true

      - name: go test (integration tag)
        # 5m wall budget covers image pull (~30s on a cold runner) +
        # six test cases × ~20s each. Bumps if we add tests; reduce
        # only after measuring.
        run: go test -tags integration -timeout 5m ./internal/remote/...

  docker-backend:
    name: integration (docker backend)
    needs: test
    # Linux-only mirror of the existing integration job, scoped to the
    # docker backend tests under `internal/exec/`. Sprint 3 / PRD 03
    # introduces `internal/exec/docker_integration_test.go` which spins
    # short-lived busybox containers via the docker backend and asserts
    # the cred-no-leak invariant from PRD 04. Skipped on PRs from forks
    # for the same reasons as the `integration` job above.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go test (integration tag — exec/docker)
        # The tests inside this package self-skip when `docker info`
        # fails, so the job is safe even on a runner without a daemon.
        # 5m matches the existing integration job's budget.
        run: go test -tags integration -timeout 5m ./internal/exec/...

  k8s-backend:
    name: integration (k8s backend — kind)
    needs: test
    # Linux-only kind-based integration job for the K8s backend (Sprint 4
    # / PRD 03 second half). Uses helm/kind-action to spin an ephemeral
    # kind cluster, then runs the integration-tagged tests under
    # internal/exec and internal/cli (the latter exercises `roksbnkctl
    # ops install/show/uninstall` end-to-end).
    #
    # Skipped on PRs from forks for the same reasons as the `integration`
    # job above — kind images pulled from upstream registries hit rate
    # limits without GHCR credentials.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: helm/kind-action@v1
        with:
          wait: 120s
          version: v0.24.0

      - name: go test (integration tag — exec/k8s + cli/ops)
        # Tests self-skip when no kubeconfig is reachable, so a kind
        # bring-up failure surfaces as a yellow-skip rather than a red
        # fail (still investigable from the kind-action logs above).
        # 10m budget covers image pulls + ops-pod scheduling + the
        # full ops install/show/uninstall lifecycle.
        run: go test -tags integration -timeout 10m ./internal/exec/... ./internal/cli/...

  windows-build:
    name: windows build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go build ./...

  goreleaser-check:
    name: goreleaser config sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          # `check` validates .goreleaser.yml without producing artefacts.
          # Catches typos and template breaks before tag time.
          args: check
