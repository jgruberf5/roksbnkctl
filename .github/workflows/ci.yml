name: CI

# Runs on every PR and on push to main. Catches the SDK-method-name and
# version-pin guesses captured in docs/SHAKEOUT.md without needing
# anyone to drive a local build.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: vet + fmt + staticcheck + test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Resolve modules
        run: |
          go mod download
          go mod verify

      - name: go vet
        run: go vet ./...

      - name: gofmt
        # Fail if any file is not gofmt-clean. `tee` keeps the diff in the
        # log so reviewers can see exactly what's wrong.
        run: gofmt -d -l . | tee /tmp/gofmt.diff && test ! -s /tmp/gofmt.diff

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: 'latest'
          install-go: false

      - name: go test
        # -race catches data races; cheap to run on the small unit suite
        # we have today.
        run: go test -race ./...

      - name: go build
        # Build everything (cmd/ + internal/) to catch any unused-import
        # or undefined-symbol issues that vet/test missed.
        run: go build ./...

  windows-build:
    name: windows build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - run: go build ./...

  goreleaser-check:
    name: goreleaser config sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          # `check` validates .goreleaser.yml without producing artefacts.
          # Catches typos and template breaks before tag time.
          args: check
