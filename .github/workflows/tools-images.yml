name: Build tools images

# Builds and publishes the per-tool docker images that PRD 03's docker
# backend pulls at runtime:
#
#   - ghcr.io/jgruberf5/roksbnkctl-tools-ibmcloud
#   - ghcr.io/jgruberf5/roksbnkctl-tools-iperf3
#
# Triggered on tag pushes (e.g. v0.9-rc1), on push to `main` (publishes a
# `:dev` tag so `go install ./cmd/roksbnkctl@main` works on a fresh host
# without a local `tools/docker/Makefile build` step), and on manual
# dispatch — never on every PR.
#
# Sprint 4 staff Issue 2 + Sprint 5 validator scope (validator owns
# CI workflow files). Tag → `:<tagname>` + `:latest`. Main-push →
# `:dev`. Workflow dispatch → both `:dev` and the input ref name.

on:
  push:
    tags: ['v*']
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: [ibmcloud, iperf3]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag-push: publish :<tagname> + :latest. The first matrix job
      # also publishes :latest; the workflow doesn't dedupe across
      # matrix runs because each tools-* image has its own :latest.
      #
      # Context is the REPO ROOT (not tools/docker/<image>/) because
      # the ibmcloud image's Stage 1 Go build needs ./cmd, ./internal,
      # go.mod/go.sum, embedded.go, and ./terraform/. The iperf3
      # Dockerfile doesn't reference repo-root paths and ignores the
      # broader context. The build-args below are ibmcloud-specific
      # and harmlessly ignored by iperf3.
      - name: Build and push (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./tools/docker/${{ matrix.image }}/Dockerfile
          build-args: |
            ROKSBNKCTL_VERSION=${{ github.ref_name }}
            ROKSBNKCTL_COMMIT=${{ github.sha }}
          push: true
          tags: |
            ghcr.io/jgruberf5/roksbnkctl-tools-${{ matrix.image }}:${{ github.ref_name }}
            ghcr.io/jgruberf5/roksbnkctl-tools-${{ matrix.image }}:latest

      # Main-push: publish :dev. internal/exec/docker.go's toolImageTag()
      # falls back to ":dev" for binaries that report Version=="dev"
      # (i.e., a `go install ./cmd/roksbnkctl@main` build); having :dev
      # in GHCR closes the gap so the docker backend doesn't fail to
      # pull on a fresh dev box.
      - name: Build and push (main → :dev)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./tools/docker/${{ matrix.image }}/Dockerfile
          build-args: |
            ROKSBNKCTL_VERSION=dev
            ROKSBNKCTL_COMMIT=${{ github.sha }}
          push: true
          tags: |
            ghcr.io/jgruberf5/roksbnkctl-tools-${{ matrix.image }}:dev

      # workflow_dispatch: build + push both forms so a manual run from
      # any branch can publish a :dev tag for testing.
      - name: Build and push (workflow_dispatch → :dev)
        if: github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./tools/docker/${{ matrix.image }}/Dockerfile
          build-args: |
            ROKSBNKCTL_VERSION=dev
            ROKSBNKCTL_COMMIT=${{ github.sha }}
          push: true
          tags: |
            ghcr.io/jgruberf5/roksbnkctl-tools-${{ matrix.image }}:dev
