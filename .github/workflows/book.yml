name: Build and deploy book

on:
  push:
    branches: [main]
    paths:
      - 'book/**'
      - '.github/workflows/book.yml'
  pull_request:
    paths:
      - 'book/**'
      - '.github/workflows/book.yml'

jobs:
  validate:
    # Build + link-check on every PR; doesn't deploy.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'
      - name: Test (link check + code-block validation)
        run: mdbook test book/
      - name: Build (catches malformed markdown)
        run: mdbook build book/

  build-deploy:
    # Deploy on push to main only.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Build book
        run: mdbook build book/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./book/book
          publish_branch: gh-pages
          # Publish under /book/ on gh-pages so the served URL matches
          # the README link: https://jgruberf5.github.io/roksbnkctl/book/
          destination_dir: book
